name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  cicd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          version: 2026.5.7
      - uses: actions/cache@v4
        with:
          path: node_modules/
          key: ${{ hashFiles('package-lock.json') }}

      - run: mise run init
      - run: mise run build
      - run: cp .github/CNAME out
      - uses: xu-cheng/latex-action@v2
        with:
          latexmk_use_xelatex: true
          working_directory: private/CV_en
          root_file: main.tex
      - uses: xu-cheng/latex-action@v2
        with:
          latexmk_use_xelatex: true
          working_directory: private/CV_de
          root_file: main.tex
      - uses: xu-cheng/latex-action@v2
        with:
          latexmk_use_xelatex: true
          working_directory: private/CL_en
          root_file: main.tex
      - uses: xu-cheng/latex-action@v2
        with:
          latexmk_use_xelatex: true
          working_directory: private/CL_de
          root_file: main.tex
      - run: cp private/CV_en/main.pdf out/assets/Hoomaan_Nemati_CV_en.pdf
      - run: cp private/CV_de/main.pdf out/assets/Hoomaan_Nemati_CV_de.pdf
      - run: cp private/CL_en/main.pdf out/assets/Hoomaan_Nemati_CL_en.pdf
      - run: cp private/CL_de/main.pdf out/assets/Hoomaan_Nemati_CL_de.pdf
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
